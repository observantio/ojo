service:
  name: linux
  instance_id: linux-0001

collection:
  poll_interval_secs: 5
  include_process_metrics: true

export:
  otlp:
    endpoint: "http://127.0.0.1:4355/v1/metrics"
    compression: gzip
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10
