name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag (example: v0.1.0)"
        required: true
        type: string
      build_legacy_linux:
        description: "Also build legacy Linux artifact"
        required: false
        default: false
        type: boolean
      build_legacy_windows:
        description: "Also build legacy Windows artifact"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-22.04
    outputs:
      value: ${{ steps.version.outputs.value }}
    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${{ github.ref_name }}"
          fi

          if [ -z "$version" ]; then
            echo "Release version is empty" >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build — ${{ matrix.name }}
    runs-on: ubuntu-22.04
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            id: linux-x86_64
            target: x86_64-unknown-linux-gnu
            platform: linux
            legacy: false

          - name: Linux aarch64
            id: linux-aarch64
            target: aarch64-unknown-linux-gnu
            platform: linux
            legacy: false

          - name: Linux x86_64 (Legacy)
            id: linux-x86_64-legacy
            target: x86_64-unknown-linux-gnu
            platform: linux
            legacy: true
            rustflags: "-C target-cpu=x86-64 -C target-feature=-sse4.2,-avx,-avx2"

          - name: Windows x86_64
            id: windows-x86_64
            target: x86_64-pc-windows-gnu
            platform: windows
            legacy: false

          - name: Windows i686 (Legacy)
            id: windows-i686-legacy
            target: i686-pc-windows-gnu
            platform: windows
            legacy: true

    steps:
      - uses: actions/checkout@v4

      - name: Install aarch64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install MinGW toolchains
        if: matrix.platform == 'windows'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64 gcc-mingw-w64-i686

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}${{ matrix.legacy && '-legacy' || '' }}

      - name: Build
        env:
          RUSTFLAGS: ${{ matrix.rustflags || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.value }}"
          mkdir -p dist

          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp "target/${{ matrix.target }}/release/ojo.exe" "dist/ojo-${VERSION}-${{ matrix.id }}.exe"
          else
            cp "target/${{ matrix.target }}/release/ojo" "dist/ojo-${VERSION}-${{ matrix.id }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}-${{ needs.resolve-version.outputs.value }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-22.04
    needs:
      - resolve-version
      - build
    if: ${{ !failure() && !cancelled() }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.value }}
          name: ${{ needs.resolve-version.outputs.value }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/**/*