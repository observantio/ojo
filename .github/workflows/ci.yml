name: Windows Snapshot Build & Artifact

on:
  push:
  pull_request:

jobs:
  build-windows:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Dump snapshot JSON
        shell: pwsh
        run: cargo run --release -- --dump-snapshot | Out-File -Encoding utf8 "snapshot-${{ matrix.os }}.json"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ matrix.os }}
          path: snapshot-${{ matrix.os }}.json