name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag (example: v0.0.2)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-22.04
    outputs:
      value: ${{ steps.version.outputs.value }}
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${{ github.ref_name }}"
          fi

          if [ -z "$version" ]; then
            echo "Release version is empty" >&2
            exit 1
          fi

          semver="${version#v}"
          if [[ ! "$semver" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must be semver (vX.Y.Z or X.Y.Z), got: $version" >&2
            exit 1
          fi

          if ! grep -q "^## \[$semver\] - " CHANGELOG.md; then
            echo "CHANGELOG.md does not contain an entry for version $semver" >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "semver=$semver" >> "$GITHUB_OUTPUT"

  build-core:
    name: Build Core - ${{ matrix.name }}
    runs-on: ubuntu-22.04
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            id: linux-x86_64
            target: x86_64-unknown-linux-gnu
            platform: linux

          - name: Linux aarch64
            id: linux-aarch64
            target: aarch64-unknown-linux-gnu
            platform: linux

          - name: Windows x86_64
            id: windows-x86_64
            target: x86_64-pc-windows-gnu
            platform: windows

          - name: Windows i686 Legacy
            id: windows-i686-legacy
            target: i686-pc-windows-gnu
            platform: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install aarch64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install MinGW toolchains
        if: matrix.platform == 'windows'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64 gcc-mingw-w64-i686

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: core-${{ matrix.target }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target "${{ matrix.target }}" -p ojo

      - name: Package
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.value }}"
          mkdir -p dist

          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp "target/${{ matrix.target }}/release/ojo.exe" "dist/ojo-${VERSION}-${{ matrix.id }}.exe"
          else
            cp "target/${{ matrix.target }}/release/ojo" "dist/ojo-${VERSION}-${{ matrix.id }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.id }}-${{ needs.resolve-version.outputs.value }}
          path: dist/*
          if-no-files-found: error

  build-services:
    name: Build Service - ojo-${{ matrix.service }} (${{ matrix.platform }})
    runs-on: ubuntu-22.04
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: docker
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: docker
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"
          - service: gpu
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: gpu
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"
          - service: sensors
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: sensors
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"
          - service: mysql
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: mysql
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"
          - service: postgres
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: postgres
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"
          - service: nfs-client
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: nfs-client
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"
          - service: nginx
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: nginx
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"
          - service: redis
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: redis
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"
          - service: systemd
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: systemd
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"
          - service: systrace
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: systrace
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"
          - service: syslog
            platform: unix
            target: x86_64-unknown-linux-gnu
            ext: ""
          - service: syslog
            platform: win
            target: x86_64-pc-windows-gnu
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Resolve service identifiers
        id: service
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          PACKAGE="ojo-${SERVICE}"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "binary=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Install MinGW toolchains
        if: matrix.platform == 'win'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: svc-${{ matrix.target }}-${{ matrix.service }}

      - name: Build
        run: cargo build --release --target "${{ matrix.target }}" -p "${{ steps.service.outputs.package }}"

      - name: Package
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.value }}"
          BINARY="${{ steps.service.outputs.binary }}"
          mkdir -p dist

          cp "target/${{ matrix.target }}/release/${BINARY}${{ matrix.ext }}" "dist/${BINARY}-${{ matrix.platform }}-${VERSION}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: service-${{ matrix.service }}-${{ matrix.platform }}-${{ needs.resolve-version.outputs.value }}
          path: dist/*
          if-no-files-found: error

  build-docs:
    name: Package Versioned Docs
    runs-on: ubuntu-22.04
    needs: resolve-version
    steps:
      - uses: actions/checkout@v4

      - name: Package docs bundle
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.value }}"
          mkdir -p "dist/ojo-docs-${VERSION}"

          cp README.md "dist/ojo-docs-${VERSION}/README.md"
          cp DEPLOYMENT.md "dist/ojo-docs-${VERSION}/DEPLOYMENT.md"
          cp CHANGELOG.md "dist/ojo-docs-${VERSION}/CHANGELOG.md"
          printf '%s\n' "$VERSION" > "dist/ojo-docs-${VERSION}/VERSION"

          tar -czf "dist/ojo-docs-${VERSION}.tar.gz" -C dist "ojo-docs-${VERSION}"

      - uses: actions/upload-artifact@v4
        with:
          name: docs-${{ needs.resolve-version.outputs.value }}
          path: dist/ojo-docs-${{ needs.resolve-version.outputs.value }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-22.04
    needs:
      - resolve-version
      - build-core
      - build-services
      - build-docs
    if: ${{ !failure() && !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Build release notes from changelog
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.semver }}"

          awk -v section="$VERSION" '
            BEGIN { in_section = 0; found = 0 }
            $0 ~ "^## \\[" section "\\] - " { in_section = 1; found = 1; next }
            /^## \[/ && in_section { exit }
            in_section { print }
            END {
              if (!found) {
                print "Did not find changelog section for " section > "/dev/stderr"
                exit 1
              }
            }
          ' CHANGELOG.md | sed "/^[[:space:]]*$/N;/^\n$/D" > RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.value }}
          name: ${{ needs.resolve-version.outputs.value }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: release-assets/**/*
