name: Quality Gates

on:
  pull_request:
  push:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  rust-quality:
    name: Rust Quality (check, clippy, test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: x86_64-pc-windows-gnu, i686-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --all-targets --all-features

      - name: Install MinGW (Windows GNU cross compiler)
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-mingw-w64-i686

      - name: Cross target check (Windows GNU)
        run: cargo check --workspace --all-targets --target x86_64-pc-windows-gnu

      - name: Cross target check (Windows GNU legacy i686)
        run: cargo check --workspace --all-targets --target i686-pc-windows-gnu

  windows-dump:
    name: Windows Build + Dump Snapshot
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Build release
        run: cargo build --release

      - name: Prepare QA snapshot folder
        run: mkdir -p tests/qa
        shell: bash

      - name: Dump windows snapshot
        run: cargo run --release -- --config windows.yaml --dump-snapshot > tests/qa/windows.json
        shell: bash

      - name: Upload windows snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-snapshot
          path: tests/qa/windows.json

      - name: Commit windows snapshot to repo
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/qa/windows.json
          if git diff --cached --quiet; then
            echo "No changes to tests/qa/windows.json"
            exit 0
          fi
          git commit -m "chore(qa): update windows snapshot"
          git push

  coverage:
    name: Coverage (line threshold)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - name: Enforce line coverage threshold (host-collectors)
        run: cargo llvm-cov -p host-collectors --all-features --summary-only --fail-under-lines 100
