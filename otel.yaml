receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4355
      grpc:
        endpoint: 0.0.0.0:4356

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    send_batch_size: 1000
    send_batch_max_size: 2000
    timeout: 10s

exporters:
  debug:
    verbosity: detailed

  prometheusremotewrite/mimir:
    endpoint: "http://localhost:4320/mimir/api/v1/push"
    #endpoint: "http://host.docker.internal:4320/mimir/api/v1/push"
    headers:
      x-otlp-token: "${MIMIR_OTLP_TOKEN}"
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m

  otlp_http/tempo:
    endpoint: "http://localhost:4320/tempo"
    headers:
      x-otlp-token: "${OTEL_OTLP_TOKEN}"
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 2000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite/mimir]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_http/tempo]

  telemetry:
    logs:
      level: debug
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 127.0.0.1
                port: 8889