services:
  qa-ubuntu-2204:
    build:
      context: ..
      dockerfile: docker.dev/ubuntu-2204.Dockerfile
    volumes:
      - ..:/workspace
    working_dir: /workspace
    command: ["bash", "tests/scripts/run_container_qa.sh", "ubuntu-2204", "/workspace"]

