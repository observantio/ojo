service:
  name: ojo-gpu
  instance_id: gpu-0001

collection:
  poll_interval_secs: 15

gpu:
  include_device_labels: false
  max_labeled_devices: 16

export:
  otlp:
    endpoint: "http://127.0.0.1:4355/v1/metrics"
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

metrics:
  include: [system.gpu.]
  exclude: []

storage:
  archive_enabled: true
  archive_dir: services/gpu/data
  archive_max_file_bytes: 67108864
  archive_retain_files: 8
  archive_file_stem: gpu-snapshots
