service:
  name: ojo-systemd
  instance_id: systemd-01
collection:
  poll_interval_secs: 10
metrics:
  include:
    - system.systemd.
  exclude: []
export:
  otlp:
    endpoint: http://127.0.0.1:4318/v1/metrics
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

storage:
  archive_enabled: true
  archive_dir: services/systemd/data
  archive_max_file_bytes: 67108864
  archive_retain_files: 8
  archive_file_stem: systemd-snapshots
