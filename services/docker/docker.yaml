service:
  name: ojo-docker
  instance_id: docker-0001

collection:
  poll_interval_secs: 10

docker:
  include_container_labels: true
  max_labeled_containers: 25

export:
  otlp:
    endpoint: "http://127.0.0.1:4355/v1/metrics"
    protocol: http/protobuf
    compression: gzip
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

metrics:
  include: [system.docker.]
  exclude: []
