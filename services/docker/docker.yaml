service:
  name: ojo-docker
  instance_id: docker-0001

collection:
  poll_interval_secs: 10

docker:
  include_container_labels: true
  max_labeled_containers: 25

export:
  otlp:
    endpoint: "http://localhost:4355/v1/metrics"
    protocol: http/protobuf
    compression: gzip
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

metrics:
  include: [system.docker.]
  exclude: []

storage:
  archive_enabled: false
  archive_dir: services/docker/data
  archive_max_file_bytes: 67108864
  archive_retain_files: 8
  archive_file_stem: docker-snapshots
