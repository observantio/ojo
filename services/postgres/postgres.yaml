service:
  name: ojo-postgres
  instance_id: postgres-0001

collection:
  poll_interval_secs: 10

postgres:
  executable: psql
  # uri: postgresql://user:pass@127.0.0.1:5432/postgres

export:
  otlp:
    endpoint: "http://localhost:4355/v1/metrics"
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

metrics:
  include: [system.postgres.]
  exclude: []

storage:
  archive_enabled: false
  archive_dir: services/postgres/data
  archive_max_file_bytes: 67108864
  archive_retain_files: 8
  archive_file_stem: postgres-snapshots
  archive_format: parquet
  archive_mode: trend
  archive_window_secs: 60
  archive_compression: zstd
