service:
  name: ojo-systrace
  instance_id: systrace-0001

collection:
  poll_interval_secs: 60
  trace_stream_max_lines: 4096


instrumentation:
  privileged_expected: true
  ebpf_enabled: true
  uprobes_enabled: true
  usdt_enabled: true
  runtime_probe_profiles: [tokio, libc, openssl]

export:
  otlp:
    endpoint: "http://localhost:4355/v1/metrics"
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

metrics:
  include: [system.systrace.]
  exclude: []

traces:
  enabled: true
  include: [systrace.]
  exclude: []


storage:
  archive_enabled: false
  archive_dir: services/systrace/data
  archive_max_file_bytes: 67108864
  archive_retain_files: 8
  archive_format: parquet
  archive_mode: trend
  archive_window_secs: 60
  archive_compression: zstd
