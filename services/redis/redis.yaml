service:
  name: ojo-redis
  instance_id: redis-01
collection:
  poll_interval_secs: 10
metrics:
  include:
    - system.redis.
  exclude: []
export:
  otlp:
    endpoint: http://localhost:4355/v1/metrics
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

storage:
  archive_enabled: false
  archive_dir: services/redis/data
  archive_max_file_bytes: 67108864
  archive_retain_files: 8
  archive_file_stem: redis-snapshots
