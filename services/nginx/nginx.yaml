service:
  name: ojo-nginx
  instance_id: nginx-01
collection:
  poll_interval_secs: 10
metrics:
  include:
    - system.nginx.
  exclude: []
export:
  otlp:
    endpoint: http://127.0.0.1:4318/v1/metrics
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

storage:
  archive_enabled: false
  archive_dir: services/nginx/data
  archive_max_file_bytes: 67108864
  archive_retain_files: 8
  archive_file_stem: nginx-snapshots
