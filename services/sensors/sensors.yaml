service:
  name: ojo-sensors
  instance_id: sensors-0001

collection:
  poll_interval_secs: 15

sensors:
  include_sensor_labels: true
  max_labeled_sensors: 32

export:
  otlp:
    endpoint: "http://localhost:4355/v1/metrics"
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

metrics:
  include: [system.sensor.]
  exclude: []

storage:
  archive_enabled: false
  archive_dir: services/sensors/data
  archive_max_file_bytes: 67108864
  archive_retain_files: 8
  archive_file_stem: sensor-snapshots
