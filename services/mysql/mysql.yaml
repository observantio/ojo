service:
  name: ojo-mysql
  instance_id: mysql-0001

collection:
  poll_interval_secs: 10

mysql:
  executable: mysql
  # Optional connection URI, e.g. mysql://user:pass@127.0.0.1:3306
  uri: ""

export:
  otlp:
    endpoint: "http://127.0.0.1:4355/v1/metrics"
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

metrics:
  include: [system.mysql.]
  exclude: []
