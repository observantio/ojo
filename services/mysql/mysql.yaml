service:
  name: ojo-mysql
  instance_id: mysql-0001

collection:
  poll_interval_secs: 10

mysql:
  executable: mysql
  # host: 127.0.0.1
  # port: 3306
  # user: root
  # password: ""
  # database: ""

export:
  otlp:
    endpoint: "http://127.0.0.1:4355/v1/metrics"
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10

metrics:
  include: [system.mysql.]
  exclude: []

storage:
  archive_enabled: true
  archive_dir: services/mysql/data
  archive_max_file_bytes: 67108864
  archive_retain_files: 8
  archive_file_stem: mysql-snapshots
