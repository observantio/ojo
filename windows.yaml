service:
  name: windows
  instance_id: windows-0001

collection:
  poll_interval_secs: 5
  include_process_metrics: true

export:
  otlp:
    endpoint: "http://192.168.0.143:4355/v1/metrics"
    protocol: http/protobuf
    timeout_secs: 10
  batch:
    interval_secs: 5
    timeout_secs: 10
    
# Optional metric selector. If omitted, Ojo exports all metrics.
# Supported groups: cpu, memory, disk, network, process, filesystem, linux, windows, host
# Examples:
# metrics: cpu
# metrics: [cpu, memory, disk]
# metrics:
#   groups: [cpu, windows]
#   include: [system.windows.]
#   exclude: [process.]
